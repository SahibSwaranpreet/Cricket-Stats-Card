*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px;}
/* ── Controls ── */
.ctrl{width:100%;max-width:560px;margin-bottom:18px;}
.ctrl h1{font-size:18px;font-weight:800;color:#4a9eff;letter-spacing:.05em;margin-bottom:2px;}
.ctrl p{font-size:11px;color:#2a4060;margin-bottom:12px;}
.leagues{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.lbtn{background:transparent;border:1.5px solid #1a2840;color:#2a4060;border-radius:20px;padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;}
.lbtn.on{color:#fff;}
.row{display:flex;gap:8px;}
.aw{position:relative;flex:1;}
input{width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #1a2840;background:#060d1a;color:#cde;font-size:13px;outline:none;}
input:focus{border-color:#2a6aaa;}
input::placeholder{color:#1e3050;}
.gob{padding:10px 18px;border-radius:8px;border:none;background:#1a5fa0;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.gob:hover{background:#2272c0;}
.gob:disabled{background:#0d1828;color:#1a2840;cursor:not-allowed;}
.acl{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#060d1a;border:1px solid #1a2840;border-radius:8px;z-index:200;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;max-height:260px;overflow-y:auto;}
.aci{padding:9px 14px;cursor:pointer;font-size:12px;color:#8aaccc;border-bottom:1px solid #0f1e30;display:flex;gap:8px;align-items:center;}
.aci:hover{background:#0d1e30;}
.aci b{color:#4a9eff;}
.achi{font-size:9px;color:#1a2840;padding:5px 14px;border-top:1px solid #0f1e2a;}
.err{background:#180808;border:1px solid #4a1010;border-radius:8px;padding:10px 14px;color:#f87171;font-size:11px;margin-top:8px;}

/* ── Card wrapper: 1080×1080 ── */
.card-outer{width:100%;max-width:560px;position:relative;}
#card{
  width:1080px;height:1080px;
  transform-origin:top left;
  position:relative;overflow:hidden;
  background:#060d1a;
}
.scaler{width:100%;overflow:hidden;position:relative;}

/* Card internal layout */
.bg-grad{position:absolute;inset:0;z-index:0;}
.player-bg{position:absolute;right:0;top:0;height:100%;width:55%;object-fit:cover;object-position:top center;z-index:1;opacity:.18;filter:blur(1px);}
.player-main{position:absolute;right:30px;bottom:0;height:88%;z-index:2;object-fit:contain;object-position:bottom right;max-width:520px;filter:drop-shadow(-20px 0 60px rgba(0,100,255,.25));}
.overlay{position:absolute;inset:0;z-index:3;background:linear-gradient(90deg,#060d1aff 42%,#060d1acc 62%,#060d1a00 80%);}

/* Content */
.content{position:absolute;inset:0;z-index:4;padding:52px 56px 44px;}
/* Top bar */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;}
.league-badge{display:flex;align-items:center;gap:10px;}
.lbadge{padding:6px 18px;border-radius:6px;font-size:14px;font-weight:900;letter-spacing:.1em;color:#fff;}
.format-tag{font-size:12px;font-weight:600;color:#4a6888;letter-spacing:.12em;margin-top:6px;}
.icc-rank{text-align:right;}
.rank-num{font-size:42px;font-weight:900;line-height:1;}
.rank-lbl{font-size:11px;color:#2a4060;letter-spacing:.1em;margin-top:2px;}

/* Player name block */
.name-block{margin-bottom:28px;}
.fname{font-size:28px;font-weight:900;color:#7ab8ff;letter-spacing:.15em;text-transform:uppercase;line-height:1;}
.lname{font-size:72px;font-weight:900;color:#ffffff;letter-spacing:.04em;text-transform:uppercase;line-height:.9;}
.role-row{display:flex;align-items:center;gap:12px;margin-top:12px;}
.role-chip{padding:5px 16px;border-radius:4px;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
.country-chip{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:700;background:rgba(255,255,255,.07);color:#7aaccc;border:1px solid rgba(255,255,255,.1);}
.age-chip{font-size:12px;color:#3a5878;font-weight:600;}

/* Quick stats row */
.qs{display:flex;gap:0;margin-bottom:32px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.07);overflow:hidden;}
.qs-item{flex:1;padding:16px 14px;text-align:center;border-right:1px solid rgba(255,255,255,.06);}
.qs-item:last-child{border-right:none;}
.qs-val{font-size:26px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;line-height:1;}
.qs-lbl{font-size:9px;font-weight:700;color:#2a4060;letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}
.qs-sub{font-size:10px;color:#4a7a9a;margin-top:2px;}

/* Detailed stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.sg-col{display:flex;flex-direction:column;gap:6px;}
.sg-hdr{font-size:9px;font-weight:800;letter-spacing:.14em;color:#2a4060;text-transform:uppercase;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.05);}
.sg-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:4px;background:rgba(255,255,255,.025);}
.sg-lbl{font-size:10px;color:#4a6888;font-weight:500;}
.sg-val{font-size:13px;font-weight:700;color:#6eddaa;font-variant-numeric:tabular-nums;}

/* Bar chart area */
.chart-section{margin-bottom:24px;}
.chart-hdr{font-size:9px;font-weight:800;letter-spacing:.14em;color:#2a4060;text-transform:uppercase;margin-bottom:8px;}
.bar-chart{display:flex;flex-direction:column;gap:6px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:10px;color:#3a5878;width:110px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.bar-val{font-size:10px;color:#5a88aa;width:36px;text-align:left;flex-shrink:0;font-variant-numeric:tabular-nums;}

/* Fixtures */
.fix-section{display:flex;flex-direction:column;gap:8px;}
.fix-hdr{font-size:9px;font-weight:800;letter-spacing:.14em;color:#2a4060;text-transform:uppercase;}
.fix-row{display:flex;gap:7px;}
.fix-pill{display:flex;flex-direction:column;align-items:center;gap:3px;}
.fix-match{border-radius:5px;padding:5px 10px;font-size:10px;font-weight:800;color:#fff;min-width:62px;text-align:center;letter-spacing:.02em;}
.fix-rnd{background:rgba(255,255,255,.04);border-radius:3px;padding:2px 8px;font-size:9px;color:#2a4060;font-weight:600;}
.fix-legend{display:flex;gap:14px;margin-top:4px;}
.fldot{width:6px;height:6px;border-radius:2px;display:inline-block;margin-right:5px;}

/* Form dots */
.form-row{display:flex;align-items:center;gap:6px;margin-bottom:20px;}
.form-lbl{font-size:9px;font-weight:700;color:#1e3050;letter-spacing:.12em;margin-right:4px;}
.fdot{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}

/* Right col – radar chart */
.right-col{position:absolute;right:52px;top:52px;z-index:5;width:360px;}
.radar-wrap{width:280px;height:280px;margin:0 auto;}
.player-meta{margin-top:16px;text-align:center;}
.ownership-bar{background:rgba(255,255,255,.04);border-radius:8px;padding:12px 16px;border:1px solid rgba(255,255,255,.07);margin-top:12px;}
.ob-label{font-size:9px;font-weight:700;color:#2a4060;letter-spacing:.12em;margin-bottom:6px;}
.ob-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.ob-fill{height:100%;border-radius:3px;}
.ob-pct{font-size:18px;font-weight:900;color:#fff;margin-top:6px;}
.ob-sub{font-size:9px;color:#2a4060;}

/* Price tag */
.price-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 16px;margin-top:10px;}
.price-val{font-size:22px;font-weight:900;color:#fff;}
.price-lbl{font-size:9px;color:#2a4060;letter-spacing:.1em;font-weight:700;}

/* Footer watermark */
.footer{position:absolute;bottom:24px;left:56px;right:56px;z-index:5;display:flex;justify-content:space-between;align-items:flex-end;}
.watermark{font-size:11px;color:#0f1e2a;letter-spacing:.1em;font-weight:700;}
.powered{font-size:9px;color:#0f1e2a;letter-spacing:.1em;}

/* Loading */
.loading{width:100%;max-width:560px;background:#060d1a;border:1px solid #1a2840;border-radius:12px;padding:48px 24px;text-align:center;}
.spin{width:32px;height:32px;border:3px solid #1a2840;border-top-color:#2a6aaa;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.exp-btn{margin-top:14px;padding:9px 20px;border-radius:8px;border:1px solid #1a2840;background:#060d1a;color:#2a6aaa;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.04em;}
.exp-btn:hover{background:#0d1a2e;color:#4a9eff;}

/* Responsive scaling */
@media(max-width:600px){body{padding:10px 8px;}}
</style>

const DIFF_COLOR={easy:"#22c55e",medium:"#f59e0b",hard:"#ef4444"};

// ── Build league pills ─────────────────────────────────────────────────────
const lc=document.getElementById("leaguePills");
LEAGUES.forEach(l=>{
  const b=document.createElement("button");
  b.className="lbtn"+(l.id==="IPL"?" on":"");
  b.textContent=l.id;
  if(l.id==="IPL"){b.style.borderColor=l.color;b.style.color=l.accent;b.style.background=l.color+"22";}
  b.onclick=()=>{
    league=l.id;
    document.querySelectorAll(".lbtn").forEach(x=>{x.classList.remove("on");x.style.borderColor="";x.style.color="";x.style.background="";});
    b.classList.add("on");b.style.borderColor=l.color;b.style.color=l.accent;b.style.background=l.color+"22";
    const q=document.getElementById("search").value.trim();
    if(q) go();
  };
  lc.appendChild(b);
});

// ── Autocomplete ───────────────────────────────────────────────────────────
const si=document.getElementById("search"),acl=document.getElementById("acl");
let act=null;
si.addEventListener("input",()=>{clearTimeout(act);act=setTimeout(buildAC,80);});
si.addEventListener("keydown",e=>{if(e.key==="Enter")go();if(e.key==="Escape")hideAC();});
document.addEventListener("mousedown",e=>{if(!document.getElementById("aw").contains(e.target))hideAC();});
function buildAC(){
  const q=si.value.toLowerCase().trim();
  if(q.length<2){hideAC();return;}
  const matches=PLAYERS.filter(p=>p.toLowerCase().split(" ").some(w=>w.startsWith(q))).slice(0,10);
  if(!matches.length){hideAC();return;}
  const th=LEAGUES.find(l=>l.id===league);
  acl.innerHTML="";
  matches.forEach(p=>{
    const d=document.createElement("div");d.className="aci";
    const hl=p.split(" ").map(w=>w.toLowerCase().startsWith(q)?`<b>${w.slice(0,q.length)}</b>${w.slice(q.length)}`:w).join(" ");
    const inDB=DB[p]&&DB[p][league];
    d.innerHTML=`<span>🏏</span><span style="flex:1">${hl}</span>${inDB?`<span style="font-size:9px;color:#1a6030;background:#0a1a10;padding:2px 5px;border-radius:3px">✓</span>`:""}`;
    d.onmousedown=()=>{si.value=p;hideAC();go();};
    acl.appendChild(d);
  });
  const h=document.createElement("div");h.className="achi";h.textContent="Not listed? Type and press Enter — stats generated via AI";
  acl.appendChild(h);
  acl.style.display="block";
}
function hideAC(){acl.style.display="none";}

// ── Scale card to fit container ────────────────────────────────────────────
function scaleCard(){
  const sc=document.getElementById("scaler");
  const card=document.getElementById("card");
  if(card.style.display==="none")return;
  const W=sc.clientWidth;
  const scale=W/1080;
  card.style.transform=`scale(${scale})`;
  sc.style.height=(1080*scale)+"px";
}
window.addEventListener("resize",scaleCard);

  } catch(e) {
    document.getElementById("err").innerHTML =
      `<div class="err">⚠ ${e.message}</div>`;
    card.style.display = "none";
  }

  document.getElementById("gob").disabled=false;
}

function guessCountry(n){
  if(["Kohli","Sharma","Dhoni","Bumrah","Pandya","Rahul","Gill","Pant","Jadeja","Shami","Yadav","Chahal","Samson","Jaiswal","Bishnoi","Kumar","Sundar","Chahar","Thakur","Gaikwad","Varma","Singh","Kishan"].some(x=>n.includes(x)))return"India";
  if(["Cummins","Smith","Warner","Starc","Maxwell","Head","Stoinis","Hazlewood","Zampa","Marsh","Finch","Lyon","Khawaja","Labuschagne","Carey","Ponting","Warne","McGrath"].some(x=>n.includes(x)))return"Australia";
  if(["Stokes","Root","Bairstow","Anderson","Broad","Brook","Crawley","Wood","Archer","Buttler","Malan","Curran","Livingstone","Salt","Morgan","Rashid","Pietersen","Flintoff"].some(x=>n.includes(x)))return"England";
  if(["Azam","Afridi","Rizwan","Shadab","Naseem","Haris","Akhtar","Wasim","Waqar"].some(x=>n.includes(x)))return"Pakistan";
  if(["Williamson","Boult","Southee","Conway","Guptill","Phillips","Ferguson","Santner","Latham"].some(x=>n.includes(x)))return"New Zealand";
  if(["Rabada","Nortje","Markram","Ngidi","Maharaj","Bavuma","de Villiers","du Plessis","Steyn","Kallis","de Kock"].some(x=>n.includes(x)))return"South Africa";
  if(["Gayle","Russell","Pollard","Pooran","Holder","Hetmyer","Narine","Bravo","Lara","Ambrose"].some(x=>n.includes(x)))return"West Indies";
  if(["Shakib","Mushfiqur","Tamim","Mustafizur","Mehidy","Litton","Taskin","Mahmudullah"].some(x=>n.includes(x)))return"Bangladesh";
  if(["Malinga","Mathews","Mendis","Shanaka","Hasaranga","Sangakkara","Muralitharan","Jayawardene","Jayasuriya"].some(x=>n.includes(x)))return"Sri Lanka";
  if(["Rashid","Nabi","Gurbaz","Mujeeb"].some(x=>n.includes(x)))return"Afghanistan";
  return"International";
}

// ── RENDER CARD ─────────────────────────────────────────────────────────────
function renderCard(name,d){
  const th=LEAGUES.find(l=>l.id===league);
  const iplM=d.team&&IPL_META[d.team];
  const thColor=league==="IPL"&&iplM?iplM.color:th.color;
  const thAccent=league==="IPL"&&iplM?iplM.accent:th.accent;
  const teamCode=league==="IPL"&&iplM?iplM.code:(d.nat||d.team||"").slice(0,3).toUpperCase();
  const nameParts=name.trim().split(" ");
  const firstName=nameParts.slice(0,-1).join(" ");
  const lastName=nameParts[nameParts.length-1];

  // Image sources – try ESPNcricinfo CDN
  const cricId=CRICINFO_IDS[name];
  const imgMain=cricId?`https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_640,q_50/lsci/db/PICTURES/CMS/${Math.floor(cricId/1000)*1000+100}/${cricId}.png`:"";
  const imgFallback=`https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_640/lsci/db/PICTURES/CMS/313600/313628.png`;

  // Bars for chart
  const bars=[
    {label:"Batting Avg",val:d.avg,max:65,color:thColor},
    {label:"Strike Rate",val:d.sr,max:200,color:thAccent},

    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:4px;background:rgba(255,255,255,.04);margin-bottom:3px">
      <span style="font-size:10px;color:rgba(255,255,255,.45);font-weight:500">${l}</span>

  const battingStats=[
    ["Runs",d.runs!=null?Number(d.runs).toLocaleString():null],
    ["Average",d.avg!=null?Number(d.avg).toFixed(2):null],
    ["Strike Rate",d.sr!=null?Number(d.sr).toFixed(1):null],
    ["High Score",d.hs!=null?d.hs:null],

    ["Wickets",d.wkts!=null?d.wkts:null],
    ["Bowl Avg",d.be!=null?Number(d.be).toFixed(2):null],
    ["Economy",d.eco!=null?Number(d.eco).toFixed(2):null],
    ["Role",d.role],

  const fixPills=(d.fixtures||[]).map(f=>`
    <div class="fix-pill">

        <div style="font-size:48px;font-weight:900;color:${thAccent};line-height:1;text-shadow:0 0 30px ${thAccent}88">${d.rank||"—"}</div>

        <div style="padding:5px 18px;border-radius:4px;font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;background:${thColor}55;color:${thAccent};border:1px solid ${thColor}99;backdrop-filter:blur(6px)">${d.role||"—"}</div>

        <div style="flex:1;padding:16px 10px;text-align:center;${i<a.length-1?"border-right:1px solid rgba(255,255,255,.1)":""}">

          <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-top:4px">${l}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.25);margin-top:2px">${s}</div>

    </div>

    <!-- Stats grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px">
      <div style="background:rgba(0,0,0,.3);backdrop-filter:blur(10px);border-radius:8px;padding:12px;border:1px solid rgba(255,255,255,.1)">
        <div style="font-size:9px;font-weight:800;letter-spacing:.14em;color:${thAccent};text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.08)">BATTING STATS</div>

  `;

  scaleCard();

  // Draw radar chart
  setTimeout(()=>{

          borderWidth:2,

          pointBorderColor:"#fff",
          pointHoverBackgroundColor:"#fff",

    eb.innerHTML="";eb.appendChild(expBtn);

}

async function exportPNG(){
  // html2canvas approach via CDN
  const card=document.getElementById("card");
  const origTransform=card.style.transform;
  card.style.transform="scale(1)";
  const scaler=document.getElementById("scaler");
  const origH=scaler.style.height;
  scaler.style.height="1080px";
  try{
    if(!window.html2canvas){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    const canvas=await window.html2canvas(card,{width:1080,height:1080,scale:1,useCORS:true,allowTaint:false,backgroundColor:"#060d1a"});
    const a=document.createElement("a");
    a.href=canvas.toDataURL("image/png");
    a.download=`cricket-card-${document.getElementById("search").value.replace(/\s+/g,"-")}-${league}.png`;
    a.click();
  }catch(e){alert("PNG export failed. Try right-click → Save As on the card, or use a screenshot tool.");}
  card.style.transform=origTransform;
  scaler.style.height=origH;
  scaleCard();
}
