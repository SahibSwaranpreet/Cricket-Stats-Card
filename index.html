<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IPL Cricket Card Generator — Live Data</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07090f;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px 12px;min-height:100vh;}
.ctrl{width:100%;max-width:580px;margin-bottom:14px;}
.ctrl h1{font-size:19px;font-weight:900;background:linear-gradient(90deg,#7ecfff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px;}
.ctrl p{font-size:10px;color:rgba(255,255,255,.38);margin-bottom:10px;}
.sw{display:flex;gap:8px;}
.si-wrap{flex:1;position:relative;}
input{width:100%;padding:11px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#eef;font-size:13px;outline:none;}
input:focus{border-color:rgba(255,255,255,.45);}
input::placeholder{color:rgba(255,255,255,.22);}
.go{padding:11px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,#1a6fc4,#7c3aed);color:#fff;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
.go:disabled{opacity:.4;cursor:not-allowed;}

/* Search results dropdown */
.sr{position:absolute;top:calc(100% + 5px);left:0;right:0;background:rgba(5,8,18,.98);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.13);border-radius:12px;z-index:300;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.7);display:none;}
.sr-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06);}
.sr-item:hover{background:rgba(255,255,255,.08);}
.sr-item:last-child{border-bottom:none;}
.sr-thumb{width:44px;height:44px;border-radius:50%;object-fit:cover;object-position:top;background:#1a2030;flex-shrink:0;border:1.5px solid rgba(255,255,255,.15);}
.sr-name{font-size:13px;font-weight:700;color:#eef;margin-bottom:2px;}
.sr-meta{font-size:10px;color:rgba(255,255,255,.4);}
.sr-loading{padding:16px;text-align:center;font-size:12px;color:rgba(255,255,255,.35);}

/* Status bar */
.status{width:100%;max-width:580px;margin-bottom:10px;font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px;min-height:18px;}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;}
.dot.loading{background:#f59e0b;animation:pulse 1s infinite;}
.dot.error{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Card */
.scaler{width:100%;max-width:580px;overflow:hidden;position:relative;}
#card{width:1080px;height:1080px;transform-origin:top left;position:relative;overflow:hidden;}
.dl{display:none;margin-top:10px;width:100%;max-width:580px;padding:9px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#7ecfff;font-size:11px;font-weight:700;cursor:pointer;}

/* Stat panel inside card */
.stat-r{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-radius:7px;margin-bottom:4px;}

/* Spin */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{border:3px solid rgba(255,255,255,.12);border-top-color:#7ecfff;border-radius:50%;animation:spin .7s linear infinite;}
</style>
</head>
<body>

<div class="ctrl">
  <h1>🏏 IPL Cricket Card Generator</h1>
  <p>Live data from ESPNCricinfo · Real player photos · All current players</p>
  <div class="sw">
    <div class="si-wrap">
      <input id="si" placeholder="Search any cricket player… Kohli, Salt, Maxwell, Nortje…" autocomplete="off"/>
      <div class="sr" id="sr"></div>
    </div>
    <button class="go" id="goBtn" onclick="manualSearch()">Search</button>
  </div>
</div>

<div class="status" id="status">
  <div class="dot" id="dot"></div>
  <span id="statusTxt">Type a player name to search live from ESPNCricinfo</span>
</div>

<div class="scaler" id="scaler"><div id="card" style="display:none"></div></div>
<button class="dl" id="dl" onclick="exportPNG()">⬇ Save 1080×1080 PNG</button>

<script>
// ── TEAM CONFIG (for card theming when team is known) ─────────────────────
const TEAMS = {
  "Royal Challengers Bengaluru":{code:"RCB",c1:"#CC0000",c2:"#FFD700",c3:"#2d0000",logo:"https://scores.iplt20.com/ipl/teamlogos/RCB.png"},
  "Royal Challengers Bangalore":{code:"RCB",c1:"#CC0000",c2:"#FFD700",c3:"#2d0000",logo:"https://scores.iplt20.com/ipl/teamlogos/RCB.png"},
  "Mumbai Indians":{code:"MI",c1:"#004BA0",c2:"#D4AC40",c3:"#000e20",logo:"https://scores.iplt20.com/ipl/teamlogos/MI.png"},
  "Chennai Super Kings":{code:"CSK",c1:"#F5A800",c2:"#0081C8",c3:"#2a1800",logo:"https://scores.iplt20.com/ipl/teamlogos/CSK.png"},
  "Kolkata Knight Riders":{code:"KKR",c1:"#3A225D",c2:"#D4AF37",c3:"#0a0515",logo:"https://scores.iplt20.com/ipl/teamlogos/KKR.png"},
  "Rajasthan Royals":{code:"RR",c1:"#E91E8C",c2:"#B8C6E3",c3:"#200018",logo:"https://scores.iplt20.com/ipl/teamlogos/RR.png"},
  "Delhi Capitals":{code:"DC",c1:"#0078BC",c2:"#EF1C21",c3:"#001428",logo:"https://scores.iplt20.com/ipl/teamlogos/DC.png"},
  "Sunrisers Hyderabad":{code:"SRH",c1:"#F26522",c2:"#FFFFFF",c3:"#1e0800",logo:"https://scores.iplt20.com/ipl/teamlogos/SRH.png"},
  "Gujarat Titans":{code:"GT",c1:"#1B3A6B",c2:"#B5CB2F",c3:"#060c18",logo:"https://scores.iplt20.com/ipl/teamlogos/GT.png"},
  "Lucknow Super Giants":{code:"LSG",c1:"#00A0A0",c2:"#FFDA00",c3:"#001a1a",logo:"https://scores.iplt20.com/ipl/teamlogos/LSG.png"},
  "Punjab Kings":{code:"PBKS",c1:"#ED1B24",c2:"#DCDDDF",c3:"#1f0002",logo:"https://scores.iplt20.com/ipl/teamlogos/PBKS.png"},
  // International teams
  "India":{code:"IND",c1:"#003399",c2:"#FF9933",c3:"#001130",logo:""},
  "Australia":{code:"AUS",c1:"#FFCD00",c2:"#00843D",c3:"#1a1200",logo:""},
  "England":{code:"ENG",c1:"#003087",c2:"#CF142B",c3:"#000f2a",logo:""},
  "Pakistan":{code:"PAK",c1:"#01411C",c2:"#FFFFFF",c3:"#001208",logo:""},
  "New Zealand":{code:"NZ",c1:"#000000",c2:"#C0C0C0",c3:"#0a0a0a",logo:""},
  "South Africa":{code:"SA",c1:"#007A4D",c2:"#FFB612",c3:"#003020",logo:""},
  "West Indies":{code:"WI",c1:"#8B1A1A",c2:"#FFD700",c3:"#2d0808",logo:""},
  "Sri Lanka":{code:"SL",c1:"#003478",c2:"#FFC300",c3:"#001530",logo:""},
  "Bangladesh":{code:"BAN",c1:"#006A4E",c2:"#F42A41",c3:"#002a1a",logo:""},
  "Afghanistan":{code:"AFG",c1:"#000000",c2:"#D4AF37",c3:"#0a0a0a",logo:""},
};

function getTeamTheme(teamName) {
  if (!teamName) return {code:"INT",c1:"#4a4a8a",c2:"#a0a0ff",c3:"#0a0a18",logo:""};
  for (const [k,v] of Object.entries(TEAMS)) {
    if (teamName.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(teamName.toLowerCase())) return v;
  }
  return {code:teamName.slice(0,3).toUpperCase(),c1:"#4a4a8a",c2:"#a0a0ff",c3:"#0a0a18",logo:""};
}

// ── API ───────────────────────────────────────────────────────────────────
const BASE = "/.netlify/functions/cricinfo";

async function apiSearch(q) {
  const r = await fetch(`${BASE}?action=search&q=${encodeURIComponent(q)}`);
  if (!r.ok) throw new Error(`Search failed: ${r.status}`);
  return r.json();
}

async function apiPlayer(id) {
  const r = await fetch(`${BASE}?action=player&id=${id}`);
  if (!r.ok) throw new Error(`Player fetch failed: ${r.status}`);
  return r.json();
}

// ── UI STATE ──────────────────────────────────────────────────────────────
const si = document.getElementById("si");
const sr = document.getElementById("sr");
const dot = document.getElementById("dot");
const statusTxt = document.getElementById("statusTxt");
let searchTimer = null;
let currentPlayer = null;

function setStatus(state, msg) {
  dot.className = "dot " + (state === "loading" ? "loading" : state === "error" ? "error" : "");
  statusTxt.textContent = msg;
}

// ── SEARCH ────────────────────────────────────────────────────────────────
si.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const q = si.value.trim();
  if (q.length < 2) { sr.style.display = "none"; return; }
  searchTimer = setTimeout(() => doSearch(q), 350);
});

si.addEventListener("keydown", e => {
  if (e.key === "Escape") sr.style.display = "none";
  if (e.key === "Enter") manualSearch();
});

document.addEventListener("mousedown", e => {
  if (!e.target.closest(".si-wrap")) sr.style.display = "none";
});

async function manualSearch() {
  const q = si.value.trim();
  if (!q) return;
  await doSearch(q, true);
}

async function doSearch(q, autoPickFirst = false) {
  sr.innerHTML = `<div class="sr-loading"><div class="spin" style="width:20px;height:20px;display:inline-block;margin-right:8px;vertical-align:middle"></div>Searching ESPNCricinfo…</div>`;
  sr.style.display = "block";
  setStatus("loading", `Searching ESPNCricinfo for "${q}"…`);

  try {
    const data = await apiSearch(q);
    const players = data.players || [];

    if (!players.length) {
      sr.innerHTML = `<div class="sr-loading" style="color:rgba(255,100,100,.7)">No players found for "${q}"</div>`;
      setStatus("error", `No results for "${q}"`);
      return;
    }

    setStatus("", `Found ${players.length} player${players.length>1?"s":""}. Select one.`);

    if (autoPickFirst && players.length === 1) {
      sr.style.display = "none";
      loadPlayer(players[0]);
      return;
    }

    sr.innerHTML = "";
    players.forEach(p => {
      const el = document.createElement("div");
      el.className = "sr-item";
      el.innerHTML = `
        <img class="sr-thumb" src="${p.image || ''}" onerror="this.src=''" alt="${p.name}"/>
        <div>
          <div class="sr-name">${p.name}</div>
          <div class="sr-meta">${p.country || ""}${p.role ? " · " + p.role : ""}${p.team ? " · " + p.team : ""}</div>
        </div>`;
      el.onmousedown = () => {
        si.value = p.name;
        sr.style.display = "none";
        loadPlayer(p);
      };
      sr.appendChild(el);
    });
    sr.style.display = "block";

    if (autoPickFirst) {
      sr.style.display = "none";
      loadPlayer(players[0]);
    }

  } catch (err) {
    sr.innerHTML = `<div class="sr-loading" style="color:rgba(255,100,100,.7)">Error: ${err.message}</div>`;
    setStatus("error", err.message);
  }
}

// ── LOAD PLAYER ───────────────────────────────────────────────────────────
async function loadPlayer(playerBasic) {
  const card = document.getElementById("card");
  card.style.display = "block";

  const tm = getTeamTheme(playerBasic.team || playerBasic.country);

  card.innerHTML = `
    <div style="position:absolute;inset:0;background:linear-gradient(145deg,${tm.c3} 0%,#07080f 50%,#04050a 100%);z-index:0"></div>
    <div style="position:absolute;top:-200px;right:-100px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,${tm.c1}40 0%,transparent 68%);z-index:0"></div>
    <div style="position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px">
      <div class="spin" style="width:56px;height:56px;border-width:4px"></div>
      <div style="font-size:20px;color:rgba(255,255,255,.5);letter-spacing:.1em">FETCHING LIVE DATA</div>
      <div style="font-size:13px;color:rgba(255,255,255,.3)">${playerBasic.name} · ESPNCricinfo</div>
    </div>`;

  scaleCard();
  setStatus("loading", `Fetching live stats for ${playerBasic.name}…`);

  try {
    const data = await apiPlayer(playerBasic.id);
    currentPlayer = { basic: playerBasic, ...data };
    renderCard(currentPlayer);
    setStatus("", `✓ Live data loaded for ${playerBasic.name}`);
  } catch (err) {
    setStatus("error", `Failed: ${err.message}`);
    card.innerHTML = `<div style="inset:0;position:absolute;background:#07090f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:5">
      <div style="font-size:18px;color:#ef4444">⚠ Could not load stats</div>
      <div style="font-size:12px;color:rgba(255,255,255,.4)">${err.message}</div>
    </div>`;
  }
}

// ── RENDER CARD ───────────────────────────────────────────────────────────
function renderCard(d) {
  const bio = d.bio || {};
  const stats = d.stats || {};
  const basic = d.basic || {};

  const name = bio.name || basic.name || "Unknown";
  const parts = name.trim().split(" ");
  const fn = parts.slice(0, -1).join(" ") || "";
  const ln = parts[parts.length - 1];

  const country = bio.country || basic.country || "";
  const role = bio.role || basic.role || "";
  const battingStyle = bio.batting || "Right-hand bat";
  const bowlingStyle = bio.bowling || "Right-arm Medium";
  const photoUrl = bio.image || basic.imageLarge || "";
  const teams = bio.currentTeams || [];

  // Detect IPL team
  const iplTeamName = teams.find(t => Object.keys(TEAMS).some(k => t.toLowerCase().includes(k.toLowerCase()) && !["India","Australia","England","Pakistan","New Zealand","South Africa","West Indies","Sri Lanka","Bangladesh","Afghanistan"].some(n => k === n)));
  const displayTeam = iplTeamName || teams[0] || country;
  const tm = getTeamTheme(iplTeamName || country);

  // Pick best stats to show (prefer IPL, fallback to T20I, then ODI)
  const bat = stats.iplBat || stats.t20iBat || stats.odiBat || null;
  const bowl = stats.iplBowl || stats.t20iBowl || stats.odiBowl || null;
  const isBat = bat && bat.r != null && bat.r > 50;

  // ICC rankings
  const rankings = bio.iccRankings || [];
  const topRank = rankings[0];

  // Radar data — inferred from stats
  const batScore = bat ? Math.min(98, Math.round((bat.avg || 0) * 1.5 + (bat.sr || 0) * 0.15)) : 20;
  const bowlScore = bowl ? Math.min(98, Math.round(100 - (bowl.avg || 35) * 1.2 + (bowl.w || 0) * 0.3)) : 15;
  const radar = [
    Math.min(98, batScore),
    Math.min(98, Math.round(batScore * 0.9)),
    Math.min(98, Math.round(batScore * 0.85)),
    Math.min(98, bowlScore),
    65,
    Math.min(98, Math.round((bat?.m || bowl?.m || 10) * 0.8))
  ];

  function statRow(lbl, val, hi, color) {
    if (val == null || val === "" || val === 0) return "";
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-radius:8px;background:${hi ? "rgba(255,255,255,.07)" : "rgba(255,255,255,.03)"};margin-bottom:5px">
      <span style="font-size:12px;color:rgba(255,255,255,.45);font-weight:600">${lbl}</span>
      <span style="font-size:16px;font-weight:900;color:${color || "#fff"};font-variant-numeric:tabular-nums">${val}</span>
    </div>`;
  }

  const card = document.getElementById("card");
  card.innerHTML = `
  <!-- Background -->
  <div style="position:absolute;inset:0;background:linear-gradient(145deg,${tm.c3} 0%,#07080f 50%,#04050a 100%);z-index:0"></div>
  <div style="position:absolute;top:-250px;right:-150px;width:820px;height:820px;border-radius:50%;background:radial-gradient(circle,${tm.c1}45 0%,transparent 65%);z-index:0;pointer-events:none"></div>
  <div style="position:absolute;bottom:-200px;left:-100px;width:550px;height:550px;border-radius:50%;background:radial-gradient(circle,${tm.c2}18 0%,transparent 65%);z-index:0;pointer-events:none"></div>

  <!-- Real player photo -->
  <img src="${photoUrl}" style="position:absolute;right:0;bottom:0;height:96%;z-index:2;object-fit:contain;object-position:bottom right;max-width:520px;filter:drop-shadow(-40px 0 100px ${tm.c1}66);" onerror="this.style.opacity='.0'"/>
  <!-- Fade overlay -->
  <div style="position:absolute;inset:0;z-index:3;background:linear-gradient(90deg,rgba(4,5,10,.97) 28%,rgba(4,5,10,.85) 46%,rgba(4,5,10,.35) 62%,transparent 78%)"></div>
  <!-- Top stripe -->
  <div style="position:absolute;top:0;left:0;right:0;height:5px;z-index:10;background:linear-gradient(90deg,${tm.c1},${tm.c2},transparent)"></div>

  <!-- CONTENT -->
  <div style="position:absolute;inset:0;z-index:5;padding:48px 52px 42px;display:flex;flex-direction:column;">

    <!-- Team/country header -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      ${tm.logo ? `<img src="${tm.logo}" width="76" height="76" style="border-radius:50%;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 12px ${tm.c1}66)" onerror="this.style.display='none'"/>` :
        `<div style="width:76px;height:76px;border-radius:50%;background:${tm.c1}44;border:2px solid ${tm.c1}66;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:${tm.c2};flex-shrink:0">${tm.code}</div>`}
      <div style="flex:1">
        <div style="font-size:18px;font-weight:900;color:${tm.c2}">${displayTeam}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:3px">${country}${role ? " · " + role : ""}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:2px">${battingStyle} · ${bowlingStyle}</div>
      </div>
      ${topRank ? `<div style="text-align:right;background:rgba(0,0,0,.5);padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);flex-shrink:0">
        <div style="font-size:32px;font-weight:900;color:${tm.c2};line-height:1">#${topRank.rank || "—"}</div>
        <div style="font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.1em;margin-top:2px">ICC ${topRank.formatType || ""} ${topRank.category || ""}</div>
      </div>` : ""}
    </div>

    <!-- Player name -->
    <div style="margin-bottom:16px;line-height:1">
      <div style="font-size:22px;font-weight:900;color:${tm.c2};letter-spacing:.16em;text-transform:uppercase;text-shadow:0 0 25px ${tm.c2}55">${fn}</div>
      <div style="font-size:86px;font-weight:900;color:#fff;letter-spacing:.02em;text-transform:uppercase;line-height:.88;text-shadow:0 5px 35px rgba(0,0,0,.9)">${ln}</div>
    </div>

    <!-- Source badge -->
    <div style="margin-bottom:14px;display:inline-flex;align-items:center;gap:8px;background:rgba(0,100,200,.2);border:1px solid rgba(0,150,255,.3);padding:5px 14px;border-radius:6px;width:fit-content">
      <div style="width:6px;height:6px;border-radius:50%;background:#22c55e"></div>
      <span style="font-size:10px;color:rgba(100,200,255,.9);font-weight:700;letter-spacing:.08em">LIVE DATA · ESPN CRICINFO</span>
    </div>

    <!-- Stats grid — 2 columns -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1">

      <!-- LEFT: Batting stats -->
      <div style="background:rgba(0,0,0,.5);backdrop-filter:blur(12px);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column">
        <div style="font-size:10px;font-weight:900;color:${tm.c2};letter-spacing:.16em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid ${tm.c1}44;text-transform:uppercase">
          ${isBat ? "BATTING STATS" : "BOWLING STATS"} ${stats.iplBat || stats.iplBowl ? "· IPL" : stats.t20iBat || stats.t20iBowl ? "· T20I" : "· ODI"}
        </div>
        ${isBat ? `
          ${statRow("Matches", bat?.m, false, "#fff")}
          ${statRow("Career Runs", bat?.r != null ? Number(bat.r).toLocaleString() : null, true, "#6ee7a4")}
          ${statRow("Batting Avg", bat?.avg != null ? Number(bat.avg).toFixed(2) : null, false, "#fff")}
          ${statRow("Strike Rate", bat?.sr != null ? Number(bat.sr).toFixed(1) : null, true, "#fbbf24")}
          ${statRow("Highest Score", bat?.hs, false, "#fff")}
          ${bat?.h > 0 ? statRow("Centuries", bat.h, true, "#f59e0b") : ""}
          ${bat?.f > 0 ? statRow("Fifties", bat.f, false, "#fff") : ""}
        ` : `
          ${statRow("Matches", bowl?.m, false, "#fff")}
          ${statRow("Wickets", bowl?.w, true, "#c084fc")}
          ${statRow("Bowling Avg", bowl?.avg != null ? Number(bowl.avg).toFixed(2) : null, false, "#fff")}
          ${statRow("Economy", bowl?.eco != null ? Number(bowl.eco).toFixed(2) : null, true, "#6ee7a4")}
          ${statRow("Best Bowling", bowl?.bb, false, "#fff")}
        `}
        ${isBat && bowl?.w ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.07)">
          ${statRow("Wickets", bowl.w, false, "#c084fc")}
          ${bowl.eco != null ? statRow("Economy", Number(bowl.eco).toFixed(2), false, "#6ee7a4") : ""}
        </div>` : ""}
      </div>

      <!-- RIGHT: Format comparison + Radar -->
      <div style="background:rgba(0,0,0,.5);backdrop-filter:blur(12px);border-radius:12px;padding:16px;border:1px solid ${tm.c1}44;display:flex;flex-direction:column">
        <div style="font-size:10px;font-weight:900;color:${tm.c2};letter-spacing:.16em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid ${tm.c1}44;text-transform:uppercase">SKILL RADAR</div>
        <canvas id="radar" width="240" height="240" style="margin:0 auto;display:block"></canvas>

        <!-- Format tabs -->
        <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
          ${["IPL","T20I","ODI","Test"].map(fmt => {
            const fmtBat = fmt === "IPL" ? stats.iplBat : fmt === "T20I" ? stats.t20iBat : fmt === "ODI" ? stats.odiBat : stats.testBat;
            const fmtBowl = fmt === "IPL" ? stats.iplBowl : fmt === "T20I" ? stats.t20iBowl : fmt === "ODI" ? stats.odiBowl : stats.testBowl;
            if (!fmtBat && !fmtBowl) return "";
            const runs = fmtBat?.r;
            const wkts = fmtBowl?.w;
            const mats = fmtBat?.m || fmtBowl?.m;
            return `<div style="flex:1;min-width:0;background:rgba(255,255,255,.06);border-radius:7px;padding:8px 6px;border:1px solid rgba(255,255,255,.1);text-align:center">
              <div style="font-size:9px;font-weight:800;color:${tm.c2};letter-spacing:.1em;margin-bottom:4px">${fmt}</div>
              <div style="font-size:14px;font-weight:900;color:#fff">${mats || "—"}</div>
              <div style="font-size:8px;color:rgba(255,255,255,.3)">MATCHES</div>
              ${runs != null ? `<div style="font-size:12px;font-weight:700;color:#6ee7a4;margin-top:3px">${Number(runs).toLocaleString()}r</div>` : ""}
              ${wkts != null ? `<div style="font-size:12px;font-weight:700;color:#c084fc;margin-top:3px">${wkts}w</div>` : ""}
            </div>`;
          }).join("")}
        </div>
      </div>

    </div>

    <!-- Teams currently playing for -->
    ${teams.length ? `<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
      ${teams.map(t => {
        const tmInfo = getTeamTheme(t);
        return `<div style="padding:4px 12px;border-radius:6px;background:${tmInfo.c1}30;border:1px solid ${tmInfo.c1}55;color:rgba(255,255,255,.7);font-size:10px;font-weight:700">${t}</div>`;
      }).join("")}
    </div>` : ""}

  </div>

  <div style="position:absolute;bottom:12px;right:52px;z-index:6;font-size:9px;color:rgba(255,255,255,.1);letter-spacing:.1em">LIVE · ESPN CRICINFO · ${new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</div>
  `;

  scaleCard();
  document.getElementById("dl").style.display = "block";

  // Draw radar
  setTimeout(() => {
    const canvas = document.getElementById("radar");
    if (!canvas) return;
    if (window._rc) window._rc.destroy();
    window._rc = new Chart(canvas, {
      type: "radar",
      data: {
        labels: ["Batting","Consistency","Power","Bowling","Fielding","Experience"],
        datasets: [{
          data: radar,
          backgroundColor: tm.c1 + "33",
          borderColor: tm.c1,
          borderWidth: 2.5,
          pointBackgroundColor: tm.c2,
          pointBorderColor: "#fff",
          pointRadius: 4,
        }]
      },
      options: {
        responsive: false, animation: { duration: 600 },
        scales: { r: {
          angleLines: { color: "rgba(255,255,255,.07)" },
          grid: { color: "rgba(255,255,255,.07)" },
          pointLabels: { color: "rgba(255,255,255,.5)", font: { size: 10, weight: "700" } },
          ticks: { display: false }, min: 0, max: 100,
        }},
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
      }
    });
  }, 100);
}

function scaleCard() {
  const sc = document.getElementById("scaler"), card = document.getElementById("card");
  if (card.style.display === "none") return;
  const s = sc.clientWidth / 1080;
  card.style.transform = `scale(${s})`;
  sc.style.height = (1080 * s) + "px";
}
window.addEventListener("resize", scaleCard);

async function exportPNG() {
  const card = document.getElementById("card"), s = card.style.transform;
  card.style.transform = "scale(1)";
  document.getElementById("scaler").style.height = "1080px";
  try {
    if (!window.html2canvas) {
      await new Promise((res, rej) => {
        const sc = document.createElement("script");
        sc.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        sc.onload = res; sc.onerror = rej; document.head.appendChild(sc);
      });
    }
    const c = await window.html2canvas(card, { width:1080, height:1080, scale:1, useCORS:true, backgroundColor:"#07090f" });
    const a = document.createElement("a");
    a.href = c.toDataURL("image/png");
    a.download = `${si.value.replace(/\s+/g,"-")}-live.png`;
    a.click();
  } catch(e) { alert("Screenshot using your system tool as fallback."); }
  card.style.transform = s;
  scaleCard();
}
</script>
